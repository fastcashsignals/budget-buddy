<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Deer head -->
  <ellipse cx="256" cy="310" rx="110" ry="100" fill="#f8fafc"/>
  <!-- Antlers -->
  <path d="M180 220 Q170 160 200 140 Q210 170 220 180 Q230 150 250 130 Q260 160 265 180" fill="none" stroke="#a16207" stroke-width="12" stroke-linecap="round"/>
  <path d="M332 220 Q342 160 312 140 Q302 170 292 180 Q282 150 262 130 Q252 160 247 180" fill="none" stroke="#a16207" stroke-width="12" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="165" cy="270" rx="28" ry="18" fill="#f8fafc" transform="rotate(-25 165 270)"/>
  <ellipse cx="347" cy="270" rx="28" ry="18" fill="#f8fafc" transform="rotate(25 347 270)"/>
  <!-- Eyes -->
  <circle cx="220" cy="290" r="16" fill="#0f172a"/>
  <circle cx="224" cy="286" r="5" fill="#fff"/>
  <circle cx="292" cy="290" r="16" fill="#0f172a"/>
  <circle cx="296" cy="286" r="5" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="256" cy="330" rx="18" ry="14" fill="url(#accent)"/>
  <!-- Mouth -->
  <path d="M240 355 Q256 370 272 355" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="190" cy="315" r="12" fill="#fecaca" opacity="0.5"/>
  <circle cx="322" cy="315" r="12" fill="#fecaca" opacity="0.5"/>
</svg>